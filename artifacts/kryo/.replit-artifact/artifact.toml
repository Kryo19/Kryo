kind = "web"
previewPath = "/"
title = "KRYO"
version = "1.0.0"
id = "artifacts/kryo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22552

[services.development]
run = "pnpm --filter @workspace/kryo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kryo", "run", "build" ]
publicDir = "artifacts/kryo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22552"
BASE_PATH = "/"
